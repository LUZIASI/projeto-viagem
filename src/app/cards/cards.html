<section class="why-choose-container"></section>
<h2 class="main-title">{{tituloprincipal}}</h2>
<div class="features-grid">
    @for (item of diferenciais; track item.titulo) {
        <div class="feature-card">
            <img src="item.icone" alt="item.titulo" class="feature-icon">
            <h3 class="feature-title">{{ item.titulo}}</h3>
            <p class="feature-description">{{item.descrica}}</p>

        </div>
    }
</div>
